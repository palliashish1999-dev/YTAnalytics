version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: yt-analytics-db
    restart: always
    environment:
      POSTGRES_USER: yt_admin
      POSTGRES_PASSWORD: yt_password_992
      POSTGRES_DB: yt_analytics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
